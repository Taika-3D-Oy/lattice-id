name: CI

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust nightly
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: clippy, rustfmt, rust-src

    - name: Install wasm32-wasip2 target (source libc/CRT)
      run: rustup target add wasm32-wasip2

    - name: Check Formatting
      run: cargo fmt -- --check

    - name: Clippy (wasip2)
      run: cargo clippy --workspace --target wasm32-wasip2 -- -D warnings

    - name: Build (wasip2)
      run: cargo build --workspace --target wasm32-wasip2

    - name: Bootstrap wasm32-wasip3 sysroot (libc/CRT)
      run: |
        WASIP2_SC="$(rustc --print sysroot)/lib/rustlib/wasm32-wasip2/lib/self-contained"
        WASIP3_SC="$(rustc --print sysroot)/lib/rustlib/wasm32-wasip3/lib/self-contained"
        mkdir -p "$WASIP3_SC"
        cp "$WASIP2_SC"/* "$WASIP3_SC"/

    - name: Build (wasip3 release)
      run: cargo build --workspace --target wasm32-wasip3 --release


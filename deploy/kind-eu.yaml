# Kind cluster config for EU region (separate cluster per region).
# Gateway exposed on host port 8000.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Runtime gateway (HTTP traffic) — port aligned with NodePort
      - containerPort: 8000
        hostPort: 8000
        protocol: TCP
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        service-node-port-range: "8000-32767"

# NATS leaf node bridge between EU and US regions.
# Deployed as a standalone pod that connects to both regional NATS servers.
# Only routes cross-region lookup subjects and replicated KV bucket data.

listen: 0.0.0.0:4222

leafnodes {
  remotes [
    {
      url: "nats://nats.eu.svc.cluster.local:4222"
      tls {
        cert_file: "/tls-eu/tls.crt"
        key_file: "/tls-eu/tls.key"
        ca_file: "/tls-eu/ca.crt"
      }
    }
    {
      url: "nats://nats.us.svc.cluster.local:4222"
      tls {
        cert_file: "/tls-us/tls.crt"
        key_file: "/tls-us/tls.key"
        ca_file: "/tls-us/ca.crt"
      }
    }
  ]
}

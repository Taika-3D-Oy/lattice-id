apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: lattice-id
  annotations:
    description: Lattice-ID authority workload (local dev only, not production)
spec:
  replicas: 1
  deployPolicy: RollingUpdate
  template:
    labels:
      app.kubernetes.io/name: lattice-id
      app.kubernetes.io/component: authority
    spec:
      components:
        - name: oidc-gateway
          image: kind-registry:5000/lattice-id/oidc-gateway:dev
          maxInvocations: 100
          localResources:
            environment:
              config:
                issuer_url: http://localhost
                kv_prefix: lid
        - name: password-hasher
          image: kind-registry:5000/lattice-id/password-hasher:dev
          maxInvocations: 8
        - name: email-worker
          image: kind-registry:5000/lattice-id/email-worker:dev
          maxInvocations: 10
        - name: abuse-protection
          image: kind-registry:5000/lattice-id/abuse-protection:dev
          maxInvocations: 100
        - name: key-manager
          image: kind-registry:5000/lattice-id/key-manager:dev
          maxInvocations: 100
        - name: region-authority
          image: kind-registry:5000/lattice-id/region-authority:dev
          maxInvocations: 100
        - name: crypto-vault
          image: kind-registry:5000/lattice-id/crypto-vault:dev
          maxInvocations: 100
          localResources:
            environment:
              config:
                kv_prefix: lid
                # kms_endpoint: ""  # leave empty to use dev-mode seed derivation
                kms_dev_seed: "lattice-id-local-dev-seed-change-before-production"
        - name: admin-ui-host
          image: kind-registry:5000/lattice-id/admin-ui-host:dev
          maxInvocations: 100
      hostInterfaces:
        - namespace: wasi
          package: http
          interfaces:
            - incoming-handler
          config:
            host: "localhost"
        - namespace: wasi
          package: config
          interfaces:
            - store
          config:
            internal_auth_secret: "local-dev-internal-auth"
            dev_mode: "true"
            require_email_verification: "false"
            allow_registration: "true"
            email_provider: "log"
            bootstrap_hook: |
              set_superadmin(true);
              log("Bootstrap: promoted " + user.email + " to superadmin");
        - namespace: wasmcloud
          package: messaging
          version: 0.2.0
          interfaces:
            - consumer
          config:
            subscriptions: ""
            nats_url: "nats://nats-data:4222"

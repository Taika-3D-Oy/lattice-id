kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Runtime gateway — port 80 so Host header is bare 'localhost' (no :port suffix),
      # matching the workload's virtual-host config.
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # NATS client port (for host-side testing)
      - containerPort: 30422
        hostPort: 4222
        protocol: TCP
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        service-node-port-range: "80-32767"

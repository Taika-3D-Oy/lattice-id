kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Runtime gateway — port 8000 (avoids conflicts with other local Kind clusters).
      - containerPort: 8000
        hostPort: 8000
        protocol: TCP
      # NATS client port (for host-side testing)
      - containerPort: 30424
        hostPort: 4224
        protocol: TCP
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        service-node-port-range: "80-32767"

apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: lattice-db-eu
  namespace: eu
  annotations:
    description: lattice-db storage service for EU region
spec:
  replicas: 1
  deployPolicy: RollingUpdate
  template:
    labels:
      app.kubernetes.io/name: lattice-db
      app.kubernetes.io/component: storage
      lattice-id.dev/region: eu
    spec:
      hostSelector:
        hostgroup: eu
      components: []
      service:
        image: kind-registry:5000/lattice-db/storage-service:dev
        maxRestarts: 5
        localResources:
          environment:
            config:
              NATS_URL: "nats-data.eu.svc.cluster.local:4222"
              LDB_INSTANCE: "lid"
              LDB_CONSISTENCY_WATCHER_WAIT_STEPS: "2"
              LDB_CONSISTENCY_WATCHER_WAIT_STEP_SECS: "1"
      hostInterfaces:
        - namespace: wasi
          package: sockets
          interfaces:
            - tcp

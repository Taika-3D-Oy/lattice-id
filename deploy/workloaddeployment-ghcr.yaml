apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: lattice-id
  annotations:
    description: Lattice-ID authority workload (GHCR images for CI / external use)
    # Images are published by CI on push to master (:latest) and on tags (:v1.x.x).
    # Replace :latest with a pinned tag for reproducible deployments.
    # Substitute __PLACEHOLDERS__ with sed before applying:
    #   sed -e 's|__ISSUER_URL__|http://localhost:8000|' \
    #       -e 's|__HOST__|localhost|' \
    #       -e 's|__NATS_DATA_URL__|nats-data:4222|' \
    #       -e 's|__NATS_MSG_URL__|nats://nats-data:4222|' \
    #       -e 's|__EMAIL_PROVIDER__|log|' \
    #       deploy/workloaddeployment-ghcr.yaml | kubectl apply -f -
spec:
  replicas: 1
  deployPolicy: RollingUpdate
  template:
    labels:
      app.kubernetes.io/name: lattice-id
      app.kubernetes.io/component: authority
    spec:
      service:
        image: ghcr.io/taika-3d-oy/lattice-db/storage-service:latest
        imagePullPolicy: Always
        maxRestarts: 10
        localResources:
          environment:
            config:
              NATS_DATA_URL: "__NATS_DATA_URL__"
              LDB_INSTANCE: "lid"
              LDB_TCP_PORT: "4080"
              LDB_CONSISTENCY_WATCHER_WAIT_STEPS: "2"
              LDB_CONSISTENCY_WATCHER_WAIT_STEP_SECS: "1"
      components:
        - name: oidc-gateway
          image: ghcr.io/taika-3d-oy/lattice-id/oidc-gateway:latest
          imagePullPolicy: Always
          maxInvocations: 100
          localResources:
            environment:
              config:
                issuer_url: __ISSUER_URL__
        - name: password-hasher
          image: ghcr.io/taika-3d-oy/lattice-id/password-hasher:latest
          imagePullPolicy: Always
          maxInvocations: 8
        - name: email-worker
          image: ghcr.io/taika-3d-oy/lattice-id/email-worker:latest
          imagePullPolicy: Always
          maxInvocations: 10
        - name: admin-ui-host
          image: ghcr.io/taika-3d-oy/lattice-id/admin-ui-host:latest
          imagePullPolicy: Always
          maxInvocations: 100
      hostInterfaces:
        - namespace: wasi
          package: http
          interfaces:
            - incoming-handler
          config:
            host: __HOST__
        - namespace: wasi
          package: config
          interfaces:
            - store
          config:
            ldb_instance: "lid"
            dev_mode: "false"
            require_email_verification: "true"
            allow_registration: "true"
            email_provider: __EMAIL_PROVIDER__
            bootstrap_hook: |
              set_superadmin(true);
              log("Bootstrap: promoted " + user.email + " to superadmin");
        - namespace: wasi
          package: http
          interfaces:
            - outgoing-handler
        - namespace: wasmcloud
          package: messaging
          version: 0.2.0
          interfaces:
            - consumer
          config:
            subscriptions: ""
            nats_url: __NATS_MSG_URL__

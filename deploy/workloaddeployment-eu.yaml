apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: lattice-id-eu
  namespace: eu
  annotations:
    description: Lattice-ID EU region (local two-region dev only, not production)
spec:
  replicas: 1
  deployPolicy: RollingUpdate
  template:
    labels:
      app.kubernetes.io/name: lattice-id
      app.kubernetes.io/component: authority
      lattice-id.dev/region: eu
    spec:
      hostSelector:
        hostgroup: eu
      components:
        - name: oidc-gateway
          image: kind-registry:5000/lattice-id/oidc-gateway:dev
          maxInvocations: 100
          localResources:
            environment:
              config:
                issuer_url: http://eu.lid.internal:8000
                kv_prefix: eu
        - name: password-hasher
          image: kind-registry:5000/lattice-id/password-hasher:dev
          maxInvocations: 8
        - name: email-worker
          image: kind-registry:5000/lattice-id/email-worker:dev
          maxInvocations: 10
        - name: abuse-protection
          image: kind-registry:5000/lattice-id/abuse-protection:dev
          maxInvocations: 100
        - name: key-manager
          image: kind-registry:5000/lattice-id/key-manager:dev
          maxInvocations: 100
        - name: region-authority
          image: kind-registry:5000/lattice-id/region-authority:dev
          maxInvocations: 100
        - name: crypto-vault
          image: kind-registry:5000/lattice-id/crypto-vault:dev
          maxInvocations: 100
          localResources:
            environment:
              config:
                kv_prefix: eu
                ldb_tenant: "lattice-id"
        - name: admin-ui-host
          image: kind-registry:5000/lattice-id/admin-ui-host:dev
          maxInvocations: 100
      hostInterfaces:
        - namespace: wasi
          package: http
          interfaces:
            - incoming-handler
          config:
            host: "eu.lid.internal"
        - namespace: wasi
          package: config
          interfaces:
            - store
          config:
            # Dev-only two-region manifest. Keep the same shared secret in both regions.
            ldb_tenant: "lattice-id"
            internal_auth_secret: "local-two-region-dev-secret"
            dev_mode: "true"
            require_email_verification: "false"
            allow_registration: "true"
            email_provider: "log"
            region_id: "eu"
            kv_prefix: "eu"
            tenant_bucket: "lid-tenants"
            client_bucket: "lid-clients"
            region_domains: '{"eu":"http://eu.lid.internal:8000","us":"http://us.lid.internal:8001"}'
            region_internal_urls: '{"eu":"__EU_URL__","us":"__US_URL__"}'
            bootstrap_hook: |
              set_superadmin(true);
              log("Bootstrap: promoted " + user.email + " to superadmin");
        - namespace: wasi
          package: http
          interfaces:
            - outgoing-handler
        - namespace: wasmcloud
          package: messaging
          version: 0.2.0
          interfaces:
            - consumer
          config:
            subscriptions: ""
            nats_url: "nats://nats-data:4222"

apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: lattice-id-us
  namespace: us
  annotations:
    description: Lattice-ID US region (local two-region dev only, not production)
spec:
  replicas: 1
  deployPolicy: RollingUpdate
  template:
    labels:
      app.kubernetes.io/name: lattice-id
      app.kubernetes.io/component: authority
      lattice-id.dev/region: us
    spec:
      hostSelector:
        hostgroup: us
      components:
        - name: oidc-gateway
          image: kind-registry:5000/lattice-id/oidc-gateway:dev
          maxInvocations: 100
          localResources:
            environment:
              config:
                issuer_url: http://us.lid.internal:8001
        - name: password-hasher
          image: kind-registry:5000/lattice-id/password-hasher:dev
          maxInvocations: 8
        - name: email-worker
          image: kind-registry:5000/lattice-id/email-worker:dev
          maxInvocations: 10
        - name: admin-ui-host
          image: kind-registry:5000/lattice-id/admin-ui-host:dev
          maxInvocations: 100
      hostInterfaces:
        - namespace: wasi
          package: http
          interfaces:
            - incoming-handler
          config:
            host: "us.lid.internal"
        - namespace: wasi
          package: config
          interfaces:
            - store
          config:
            # Dev-only two-region manifest. Keep the same shared secret in both regions.
            internal_auth_secret: "local-two-region-dev-secret"
            ldb_instance: "lid"
            dev_mode: "true"
            require_email_verification: "false"
            allow_registration: "true"
            email_provider: "log"
            region_id: "us"
            tenant_bucket: "tenants"
            client_bucket: "clients"
            region_domains: '{"eu":"http://eu.lid.internal:8000","us":"http://us.lid.internal:8001"}'
            region_internal_urls: '{"eu":"__EU_URL__","us":"__US_URL__"}'
            bootstrap_hook: |
              set_superadmin(true);
              log("Bootstrap: promoted " + user.email + " to superadmin");
        - namespace: wasi
          package: http
          interfaces:
            - outgoing-handler
        - namespace: wasmcloud
          package: messaging
          version: 0.2.0
          interfaces:
            - consumer
          config:
            subscriptions: ""
            nats_url: "nats://nats-data:4222"

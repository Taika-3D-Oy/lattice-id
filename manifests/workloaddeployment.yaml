apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: lattice-id
  annotations:
    description: Lattice-ID authority workload for one shared identity domain
spec:
  replicas: 1
  deployPolicy: RollingUpdate
  template:
    labels:
      app.kubernetes.io/name: lattice-id
      app.kubernetes.io/component: authority
    annotations:
      lattice-id.dev/shared-state-boundary: one-active-authority-per-kv-prefix
    spec:
      components:
        - name: oidc-gateway
          image: ghcr.io/your-org/lattice-id/oidc-gateway:v0.1.0
          poolSize: 1
          maxInvocations: 200
          localResources:
            environment:
              config:
                issuer_url: https://auth.example.com
                kv_prefix: acme-lid
        - name: password-hasher
          image: ghcr.io/your-org/lattice-id/password-hasher:v0.1.0
          poolSize: 4
          maxInvocations: 200
        - name: email-worker
          image: ghcr.io/your-org/lattice-id/email-worker:v0.1.0
          poolSize: 1
          maxInvocations: 50
        - name: abuse-protection
          image: ghcr.io/your-org/lattice-id/abuse-protection:v0.1.0
          poolSize: 2
          maxInvocations: 200
        - name: key-manager
          image: ghcr.io/your-org/lattice-id/key-manager:v0.1.0
          poolSize: 1
          maxInvocations: 100
        - name: region-authority
          image: ghcr.io/your-org/lattice-id/region-authority:v0.1.0
          poolSize: 1
          maxInvocations: 100
        - name: admin-ui-host
          image: ghcr.io/your-org/lattice-id/admin-ui-host:v0.1.0
          poolSize: 1
          maxInvocations: 100
      service:
        image: ghcr.io/your-org/lattice-id/core-service:v0.1.0
        maxRestarts: 3
        localResources:
          environment:
            config:
              kv_prefix: acme-lid
      hostInterfaces:
        - namespace: wasi
          package: http
          interfaces:
            - incoming-handler
          config:
            host: auth.example.com
        - namespace: wasi
          package: config
          interfaces:
            - store
          config:
            # Required for multi-region deployments. All regions must share the
            # same value so `/internal/*` config sync and lookup requests are
            # authenticated.
            internal_auth_secret: "REPLACE_ME"
            # bootstrap_hook: Rhai script run on the first registration
            # when no superadmin exists yet.  Set inline or load from a
            # K8s Secret via secretFrom.
            bootstrap_hook: |
              if user.email == "admin@example.com" {
                set_superadmin(true);
                log("Bootstrap: promoted " + user.email + " to superadmin");
              }
            # Email delivery via AWS SES.
            # For SendGrid or other HTTP APIs, set email_provider: "http"
            # and configure email_http_url + email_http_api_key instead.
            email_provider: "ses"
            email_ses_region: "eu-north-1"
            # In production, source these from K8s Secrets via secretFrom:
            email_ses_access_key_id: "REPLACE_ME"
            email_ses_secret_access_key: "REPLACE_ME"
            email_from: "noreply@auth.example.com"
            # Production defaults (explicit for clarity):
            # require_email_verification: "true"   (default)
            # allow_registration: not set — closed by default,
            # superadmin enables via PUT /api/settings
        - namespace: wasmcloud
          package: messaging
          interfaces:
            - consumer
            - handler
          config:
            subscriptions: ""
        - name: acme-lid-users
          namespace: taika3d
          package: lid
          interfaces:
            - keyvalue-nats-cas
          config:
            bucket: acme-lid-users
        - name: acme-lid-user-idx
          namespace: taika3d
          package: lid
          interfaces:
            - keyvalue-nats-cas
          config:
            bucket: acme-lid-user-idx
        - name: acme-lid-sessions
          namespace: taika3d
          package: lid
          interfaces:
            - keyvalue-nats-cas
          config:
            bucket: acme-lid-sessions
        - name: acme-lid-clients
          namespace: taika3d
          package: lid
          interfaces:
            - keyvalue-nats-cas
          config:
            bucket: acme-lid-clients
        - name: acme-lid-tenants
          namespace: taika3d
          package: lid
          interfaces:
            - keyvalue-nats-cas
          config:
            bucket: acme-lid-tenants
        - name: acme-lid-memberships
          namespace: taika3d
          package: lid
          interfaces:
            - keyvalue-nats-cas
          config:
            bucket: acme-lid-memberships
        - name: acme-lid-audit
          namespace: taika3d
          package: lid
          interfaces:
            - keyvalue-nats-cas
          config:
            bucket: acme-lid-audit
        - name: acme-lid-cache
          namespace: taika3d
          package: lid
          interfaces:
            - keyvalue-in-memory
          config:
            # We no longer need to special-case the bucket name in code
            # because the YAML now explicitly assigns this to the in-memory provider.
            bucket: lid-cache
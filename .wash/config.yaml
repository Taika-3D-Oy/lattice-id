version: 2.0.1

build:
  command: cargo build --workspace --target wasm32-wasip3 --release
  component_path: target/wasm32-wasip3/release/oidc_gateway.wasm

dev:
  address: "0.0.0.0:8000"
  wasip3: true
  components:
    - name: password-hasher
      file: target/wasm32-wasip3/release/password_hasher.wasm
    - name: email-worker
      file: target/wasm32-wasip3/release/email_worker.wasm
    - name: abuse-protection
      file: target/wasm32-wasip3/release/abuse_protection.wasm
    - name: key-manager
      file: target/wasm32-wasip3/release/key_manager.wasm
    - name: region-authority
      file: target/wasm32-wasip3/release/region_authority.wasm
  host_interfaces:
    - namespace: wasi
      package: config
      interfaces:
        - store
      config:
        nats_url: "nats://localhost:4222"
        dev_mode: "true"
        issuer_url: "http://localhost:8000"
        email_provider: "log"
        require_email_verification: "false"
        allow_registration: "true"
        bootstrap_hook: |
          set_superadmin(true);
          log("Bootstrap: promoted " + user.email + " to superadmin");
